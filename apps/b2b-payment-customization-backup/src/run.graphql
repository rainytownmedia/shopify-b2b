query RunInput {
  paymentMethods {
    id
    name
  }
  cart {
    buyerIdentity {
      customer {
        id
        metafield(namespace: "b2b_app", key: "b2b_tags") {
          value
        }
      }
    }
    lines {
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
    cost {
      subtotalAmount {
        amount
      }
    }
  }
  shop {
    metafield(namespace: "b2b_app", key: "payment_rules") {
      value
    }
  }
}
