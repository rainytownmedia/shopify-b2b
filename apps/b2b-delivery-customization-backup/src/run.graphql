query RunInput {
  cart {
    deliveryGroups {
      deliveryOptions {
        handle
        title
      }
    }
    buyerIdentity {
      customer {
        id
        metafield(namespace: "b2b_app", key: "b2b_tags") {
          value
        }
      }
    }
    lines {
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
    cost {
      subtotalAmount {
        amount
      }
    }
  }
  shop {
    metafield(namespace: "b2b_app", key: "shipping_rules") {
      value
    }
  }
}
